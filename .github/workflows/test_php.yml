name: PHP Syntax Check (PR Only)
'on':
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  php-lint:
    name: Verifica Sintassi PHP
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout del codice
        uses: actions/checkout@v4
      - name: 2. Configurazione ambiente PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: 3. Esecuzione PHP Lint
        run: 'find . -name "*.php" -exec php -l {} \;'
